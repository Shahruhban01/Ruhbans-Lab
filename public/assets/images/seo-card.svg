<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Developer Ruhban</title>
  <desc id="desc">A bold editorial-style social preview card for SEO and sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="190" fill="#38bdf8" fill-opacity="0.12"/>
  <circle cx="180" cy="520" r="240" fill="#f97316" fill-opacity="0.10"/>
  <rect x="90" y="90" width="120" height="12" rx="6" fill="url(#accent)"/>
  <text x="90" y="210" fill="#f8fafc" font-size="72" font-family="Arial, Helvetica, sans-serif" font-weight="700">Developer Ruhban</text>
  <text x="90" y="292" fill="#cbd5e1" font-size="30" font-family="Arial, Helvetica, sans-serif">SEO-ready content platform for tutorials, projects, and knowledge modules.</text>
  <text x="90" y="372" fill="#94a3b8" font-size="24" font-family="Arial, Helvetica, sans-serif">Structured data • Sitemaps • RSS • Internal linking • Performance</text>
  <rect x="90" y="470" width="360" height="68" rx="18" fill="url(#accent)"/>
  <text x="120" y="514" fill="#111827" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">developer-ruhban</text>
</svg>